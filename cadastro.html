<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>CADASTRO</title>
</head>

<body>
    <main class="container">
        <form action="index.html" method="post" id="form-cadastro">
            <h1> Cadastrar-se </h1>

            <!-- Campo de Usuário -->
            <div class="input-box">
                <label for="username">Usuário</label>
                <div class="input-field">
                    <input id="username" placeholder="Usuário..." type="text" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <!-- Campo de Email -->
            </div>
            <div class="input-box">
                <label for="email">E-mail</label>
                <div class="input-field">
                    <input id="email" name="email" placeholder="Email..." type="email" required>
                    <i class="fa-regular fa-envelope"></i>
                </div>
            </div>

            <!-- Campo de Senha -->
            <div class="input-box">
                <label for="password">Senha</label>
                <div class="input-field">
                    <input id="password" name="password" placeholder="Senha..." type="password" required>
                    <i class="fa fa-eye" id="btn-eye-register" style="cursor: pointer;"></i>
                </div>
            </div>

            <!--botão-->
            <button class="btn-register" type="submit"> Cadastrar</a> </button>

            <!-- Link Rotorno Login -->
            <div class="register-link">
                <p>Já tem uma conta? <a href="index.html">Faça login</a></p>
            </div>
        </form>
    </main>
    <script src="cadastro.js"></script>
</body>

</html>
