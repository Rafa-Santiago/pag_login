<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>LOGIN</title>
</head>

<body>
    <main class="container">
        <form action="#" method="post" id="form-login">
            <h1>Bem vindo!</h1>

            <!-- Campo de Email -->
            <div class="input-box">
                <label for="email">E-mail</label>
                <div class="input-field">
                    <input id="email" name="email" placeholder="Digite sua e-mail..." type="email" required>
                    <i class="fa fa-user"></i>
                </div>
            </div>

            <!-- Campo de Senha  -->
            <div class="input-box">
                <label for="password">Senha</label>
                <div class="input-field">
                    <input id="password" name="password" placeholder="Digite sua senha..." type="password" required>
                    <i class="fa fa-eye" id="btn-eye" style="cursor: pointer;"></i>
                </div>
            </div>

            <!--Equeci a senha e lembrar senha -->
            <div class="remember-forgot">
                <label>
                    <input type="checkbox" name="remember">
                    Lembrar senha
                </label>
                <a href="¨#">Esqueci minha senha</a>
            </div>

            <!-- Botão de Ação -->
            <button class="btn-login" type="submit">Entrar</button>

            <!-- Link de Cadastro -->
            <div class="register-link">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </form>
    </main>
    <script src="login.js"></script>
</body>

</html>
